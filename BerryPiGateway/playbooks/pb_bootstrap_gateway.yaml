- name: Update and upgrade all hosts in the inventory file
  hosts: berrygateway
  tasks:
    - name: Update and upgrade apt packages
      become: true
      apt:
        upgrade: yes
        update_cache: yes
        cache_valid_time: 86400

    - name: Install package dependencies
      become: true
      apt:
        update_cache: yes
        autoremove: yes
        state: present
        pkg:
          - wtype
          - rpi-splash-screen-support
          - lightdm
          - fluxbox
          - lxterminal
          - x11-xserver-utils
          - git
          - python3-pip
          - python3-virtualenv
          - python3-pyqt6
          - xterm
          - libxcb-cursor0
          - libxcb-icccm4
          - libxcb-keysyms1
          - libxcb-shape0
          - libxcb-xkb1
          - libxkbcommon-x11-0
          - x11-utils
          - mc

    - name: "Set default to graphical target"
      become: true
      command: "systemctl set-default graphical.target"

    - name: Ensure getty service configuration directory exists
      become: true
      file:
        path: /etc/systemd/system/getty@tty1.service.d
        state: directory

    - name: Configure autologin for berrycells user
      become: true
      copy:
        dest: /etc/systemd/system/getty@tty1.service.d/autologin.conf
        src: ../overlay/etc/systemd/system/getty@tty1.service.d/autologin.conf

    - name: Configure lightdm autologin for berrycells user
      become: true
      command: sed /etc/lightdm/lightdm.conf -i -e "s/^\(#\|\)autologin-user=.*/autologin-user=berrycells/"

    - name: Set country to GB to enable Wi-Fi
      become: true
      command: raspi-config nonint do_wifi_country GB

    - name: Setup wifi hotspot for the berrymetre - for the pmf workaround
      become: true
      command: nmcli device wifi hotspot ssid berrycells password berrysolarcells
      ignore_errors: true

    - name: Workaround for https://github.com/raspberrypi/trixie-feedback/issues/29
      become: true
      command: nmcli con mod Hotspot 802-11-wireless-security.pmf 1

    - name: Setup wifi hotspot for the berrymetre
      become: true
      command: nmcli device wifi hotspot ssid berrycells password berrysolarcells

    - name: Setup wifi hotspot ip range
      become: true
      command: nmcli connection modify Hotspot ipv4.addresses 192.168.15.2/24

    - name: Set wifi hotspot autoconnect to true to enable it on every boot
      become: true
      command: nmcli connection modify Hotspot connection.autoconnect true

    - name: Clone the BerryMetre repository
      ansible.builtin.git:
        repo: https://github.com/freitaglab/BerryMetre.git
        dest: ~/BerryMetre

    - name: Remove PyQt6 from requirements.txt
      command: sed -i 's/PyQt6//' ~/BerryMetre/BerryMetrePythonReceiver/requirements.txt

    - name: Create virtual environment and install requirements for the BerryMetre
      pip:
        requirements: ~/BerryMetre/BerryMetrePythonReceiver/requirements.txt
        virtualenv: ~/venvs/berrymetre
        virtualenv_python: python3

    - name: Set include system site packages to true for venv
      command: sed -i 's/include-system-site-packages = false/include-system-site-packages = true/g' ~/venvs/berrymetre/pyvenv.cfg

    - name: Copy local configuration file
      copy:
        dest: ~/BerryMetre/BerryMetrePythonReceiver/berryconfig.py
        src: ../overlay/home/berrycells/BerryMetre/BerryMetrePythonReceiver/berryconfig.py

    - name: Patch the brother python package to work with new pillow version
      command: sed -i 's/ANTIALIAS/LANCZOS/g' ~/venvs/berrymetre/lib/python3.13/site-packages/brother_ql/conversion.py

    - name: Copy bashrc
      copy:
        dest: ~/.bashrc
        src: ../overlay/home/berrycells/.bashrc

    - name: Copy startup script
      copy:
        dest: ~/startBerryMetre.sh
        src: ../overlay/home/berrycells/startBerryMetre.sh
        mode: "0755"

    - name: Ensure fluxbox configuration directory exists
      file:
        path: ~/.fluxbox
        state: directory

    - name: Copy fluxbox startup configuration
      copy:
        dest: ~/.fluxbox/startup
        src: ../overlay/home/berrycells/.fluxbox/startup

    - name: Copy fluxbox startup configuration
      copy:
        dest: ~/.fluxbox/menu
        src: ../overlay/home/berrycells/.fluxbox/menu

    - name: Copy fluxbox init configuration
      copy:
        dest: ~/.fluxbox/init
        src: ../overlay/home/berrycells/.fluxbox/init

    - name: Make sure there is no lastwallpaper file
      ansible.builtin.file:
        path: ~/.fluxbox/lastwallpaper
        state: absent

    - name: Copy berrycell splash image
      become: true
      copy:
        dest: /root/logo.tga
        src: ../overlay/root/logo.tga

    # Disable until https://github.com/raspberrypi/rpi-splash-screen-support/issues/5 is fixed
    # - name: Configure berrycells splash image
    #   become: true
    #   command: configure-splash /root/logo.tga

    - name: Ensure fluxbox configuration directory exists
      file:
        path: ~/.fluxbox
        state: directory

    - name: Copy fluxbox startup configuration
      copy:
        dest: ~/.fluxbox/startup
        src: ../overlay/home/berrycells/.fluxbox/startup

    - name: Copy fluxbox menu configuration
      copy:
        dest: ~/.fluxbox/menu
        src: ../overlay/home/berrycells/.fluxbox/menu

    - name: Copy fluxbox init configuration
      copy:
        dest: ~/.fluxbox/init
        src: ../overlay/home/berrycells/.fluxbox/init

    - name: Make sure there is no lastwallpaper file
      ansible.builtin.file:
        path: ~/.fluxbox/lastwallpaper
        state: absent

    - name: Copy berrycell background image to home folder
      copy:
        dest: ~/splash.png
        src: ../overlay/home/berrycells/splash.png

    - name: Append custom parameters to cmdline.txt to make boot less chatty
      become: true
      command: sed -i "1 s|$| logo.nologo consoleblank=0 loglevel=0 vt.global_cursor_default=0 splash silent quiet|" /boot/firmware/cmdline.txt

    - name: Reboot the machine so we can set the fluxbox background image
      become: true
      ansible.builtin.reboot:
        msg: "Rebooting machine in 5 seconds"

    - name: Set fluxbox background image
      environment:
        DISPLAY: ":0.0"
      command: fbsetbg -f /home/berrycells/splash.png

    - name: Disable serial console using raspi-config
      become: true
      command: raspi-config nonint do_serial_cons 1

    - name: Enable serial hardware using raspi-config
      become: true
      command: raspi-config nonint do_serial_hw 0

    - name: Disable bluetooth in config.txt
      become: true
      lineinfile:
        path: /boot/firmware/config.txt
        line: dtoverlay=disable-bt
        state: present
        create: true
        insertafter: "[all]"

    - name: Disable tty1
      become: true
      command: "sudo systemctl disable --now getty@tty1"

    - name: Reboot the machine
      become: true
      ansible.builtin.reboot:
        msg: "Rebooting machine in 5 seconds"
